# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci && npm run check
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MELOGIC_RECORDS }}
      - name: Deploy to Firebase Hosting
        shell: bash
        run: |
          set -o pipefail

          deploy_log="$RUNNER_TEMP/firebase-hosting-deploy.log"

          set +e
          npx -y firebase-tools@15.22.3 deploy --only hosting --project melogic-records 2>&1 | tee "$deploy_log"
          deploy_status=${PIPESTATUS[0]}
          set -e

          if [ "$deploy_status" -eq 0 ]; then
            exit 0
          fi

          active_version_error_count=$(grep -Ec "Can't release to projects/-/sites/melogic-records/channels/live: supplied version .* is the current active version" "$deploy_log" || true)
          firebase_error_count=$(grep -Ec "(^|[[:space:]])Error:" "$deploy_log" || true)

          if [ "$active_version_error_count" -gt 0 ] && [ "$firebase_error_count" -le "$active_version_error_count" ]; then
            echo "Firebase Hosting reports this version is already live; treating the idempotent live release retry as successful."
            exit 0
          fi

          exit "$deploy_status"
